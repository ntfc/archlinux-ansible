- hosts: localhost
  roles:
    - archlinux

  vars_prompt:
    - name: "archlinux_user_name"
      prompt: "Enter desired non-root username"
      default: "nuno"
      private: no
    - name: "archlinux_user_email"
      prompt: "Enter your email (for gitconfig)"
      private: no
    - name: "install_nvidia"
      prompt: "Install nvidia?"
      default: False
      private: no
    - name: "archlinux_user_password"
      prompt: "Enter password for non-root username"
      private: yes
      encrypt: "sha512_crypt"
      confirm: yes
      salt_size: 14
