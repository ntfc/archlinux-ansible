---
- name: check required
  assert:
    that:
      - "{{ item }}"
  with_items: "{{ cli_required }}"

- name: install shell
  pacman:
    name: "{{ cli_shell_packages }}"
    state: present
  become: yes

- name: change user shell
  user:
    name: "{{ user_name }}"
    shell: "/usr/bin/{{ cli_default_shell }}"
  become: yes

- name: stow bash
  command: "stow -d {{ user_dotfiles_path }} -t ~ bash"
  become: yes
  become_user: "{{ user_name }}"
  when: '"bash" in cli_shell_packages'

- name: stow zsh
  command: "stow -d {{ user_dotfiles_path }} -t ~ zsh"
  become: yes
  become_user: "{{ user_name }}"
  when: '"zsh" in cli_shell_packages'

- name: install terminal
  pacman:
    name: "{{ cli_terminal_packages }}"
    state: present
  become: yes
  tags: ['terminal']

- name: install terminal AUR packages
  aur:
    use: "{{ aur_helper }}"
    name: "{{ cli_aur_packages }}"
  become: yes
  become_user: "{{ aur_user }}"
  tags: ['terminal']

- name: stow rxvt-unicode
  command: "stow -d {{ user_dotfiles_path }} -t ~ urxvt"
  become: yes
  become_user: "{{ user_name }}"
  when: '"rxvt-unicode" in cli_terminal_packages'
  tags: ['terminal']

- name: stow termite
  command: "stow -d {{ user_dotfiles_path }} -t ~ termite"
  become: yes
  become_user: "{{ user_name }}"
  when: '"termite" in cli_terminal_packages'
  tags: ['terminal']

- name: stow aliases
  command: "stow -d {{ user_dotfiles_path }} -t ~ alias"
  become: yes
  become_user: "{{ user_name }}"

- name: template the terminal open/close scripts
  template:
    src: "{{ item.src }}"
    dest: "/home/{{ user_name }}/.scripts/{{ item.name }}"
    mode: u=rx,g=xr,o=xr
  with_items:
    - { src: open-terminal.sh.j2, name: "open-terminal" }
    - { src: close-window.sh.j2, name: "close-window" }
  become: yes
  become_user: "{{ user_name }}"
  tags: ['terminal']

- name: install tmux
  pacman:
    name:
      - tmux
  become: yes
  when: cli_install_tmux|default(False)

- name: install tmux plugin manager
  git:
    accept_hostkey: yes
    repo: https://github.com/tmux-plugins/tpm
    version: "master"
    dest: ~/.tmux/plugins/tpm
  become: yes
  become_user: "{{ user_name }}"
  when: cli_install_tmux|default(False)

- name: stow tmux
  command: "stow -d {{ user_dotfiles_path }} -t ~ tmux"
  become: yes
  become_user: "{{ user_name }}"
  when: cli_install_tmux|default(False)
