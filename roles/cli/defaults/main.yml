---
cli_required:
  - cli_default_shell is defined and cli_default_shell in ['bash', 'zsh', 'sh']
  - cli_terminal_packages is defined and cli_terminal_packages|length > 0
  - cli_terminal_emulator is defined and cli_terminal_emulator.name in ['rxvt-unicode', 'termite']

cli_default_shell: zsh
cli_shell_packages:
  - bash
  - zsh
  - zsh-autosuggestions
  - zsh-completions

cli_terminal_emulator:
  name: termite # or urxvt
  class: Termite # or URxvt
  executable: termite
cli_terminal_packages:
  - rxvt-unicode
  - termite
  - xterm

cli_aur_packages:
  - urxvt-font-size-git # on-the-fly URxvt font size adjustments

cli_install_tmux: yes
