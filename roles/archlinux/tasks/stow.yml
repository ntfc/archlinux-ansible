---
- block:
  - name: install stow
    pacman: name=stow state=present
    become: yes

  - name: get my dotfiles from {{ dotfiles_git }}
    git:
      accept_hostkey: yes
      repo: "{{ dotfiles_git }}"
      dest: ~/dotfiles
    become: yes
    become_user: "{{ archlinux_user_name }}"

  tags:
    - stow
    - dotfiles
