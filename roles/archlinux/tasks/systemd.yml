---
- block:
  - name: activate systemd acpi events
    ini_file: 
      dest: /etc/systemd/logind.conf
      section: Login
      option: "{{ item.option }}"
      value: "{{ item.value }}"
    with_items:
      - { option: 'HandlePowerKey', value: 'lock' }
      - { option: 'HandleSuspendKey', value: 'suspend' }
      - { option: 'HandleLidSwitch', value: 'suspend-then-hibernate' }
      - { option: 'HandleLidSwitchDocked', value: 'ignore' }
      - { option: 'HandleLidSwitchExternalPower', value: 'suspend' }
    notify: 
      - restart logind
    become: yes

  tags:
    - systemd
