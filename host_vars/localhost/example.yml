#
# # the user name to create when using the `user` role
# user_name: string
# # the user password, NOT in clear text but generated by one the methods from
# # https://docs.ansible.com/ansible/latest/reference_appendices/faq.html#how-do-i-generate-encrypted-passwords-for-the-user-module
# # TLDR:
# # 1. Run `python -c "from passlib.hash import sha512_crypt; import getpass; print(sha512_crypt.using(rounds=5000).hash(getpass.getpass()))"`
# # 2. It will prompt for a password, enter it
# # 3. Copy the cryptic output and use it for `user_password`
# # Here is an example for `abc123`:
# user_password: "$6$mdaHLnk9ZWPtQE5X$70ufXk/uloRmHflAARsq.vBK2IdA9VbjZtpqR/uLYm0qkkgyNGj64tyIL3qF8aoZbowcFmohjcTGyH4bePQMt0"
