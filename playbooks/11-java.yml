- hosts: all
  tags: ['java']
  tasks:
    - name: install java development tools
      pacman:
        name:
          - jdk-openjdk
          - maven
        state: present
      become: yes

    - name: add java environment to /etc/profile
      ini_file:
        path: /etc/environment
        section: null
        option: "_JAVA_OPTIONS"
        value: "'-Dawt.useSystemAAFontSettings=on -Dswing.aatext=true'"
        no_extra_spaces: true
        state: present
      become: yes


