- hosts: all
  tags: ['docker', 'container']
  pre_tasks:
    - name: check required
      assert:
        that:
          - user_name is defined

  tasks:
    - name: install docker
      pacman:
        name:
          - docker
        state: present
      become: yes

    - name: add user to docker group
      user:
        name: "{{ user_name }}"
        groups: docker
        append: yes
      become: yes
