- hosts: localhost
  connection: local
  vars_files:
    - defaults.yml
  roles:
    - role: pacman
      tags: ['pacman', 'aur']
    - role: sudo
      tags: ['sudo']
    - role: locale
      tags: ['locale', 'timezone', 'ntp']
    - role: network
      tags: ['network']
    - role: bluetooth
      tags: ['bluetooth']
      when: bluetooth_install|default(False) == True
    - role: login
      tags: ['login', 'lightdm']

  # power / suspend / laptop power
  # nvidia
